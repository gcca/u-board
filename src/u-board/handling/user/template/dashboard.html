{{! Dashboard Fragment }}
<div class="mx-auto max-w-7xl">
  <div class="mb-8">
    <h1 class="text-4xl font-bold">Dashboard</h1>
    <p class="mt-2 opacity-60">Welcome back</p>
  </div>

  {{! User Information Section }}
  <div class="mt-4">
    <div class="card bg-base-100 shadow">
      <div class="card-body">
        <div class="grid gap-4 md:grid-cols-2">
          <div>
            <div class="text-sm opacity-60">Username</div>
            <div class="text-lg font-semibold">{{username}}</div>
          </div>
          <div>
            <div class="text-sm opacity-60">Role</div>
            <div class="text-lg font-semibold">
              <span class="badge badge-accent">{{role}}</span>
            </div>
          </div>
          <div>
            <div class="text-sm opacity-60">Last Login</div>
            <div class="text-lg">{{last_login}}</div>
          </div>
          <div>
            <div class="text-sm opacity-60">Account Created</div>
            <div class="text-lg">{{created_at}}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
