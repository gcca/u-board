<div class="mx-auto max-w-3xl">
  <div class="mb-8 flex items-center gap-4">
    <button class="btn btn-ghost btn-sm"
        hx-get="/u-board/admin/datamark-reports/list"
        hx-target="#main-content"
        hx-swap="innerHTML"
        hx-push-url="?t=datamark-reports">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-4 w-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
      </svg>
      Volver
    </button>
    <h1 class="text-4xl font-bold">{{source_name}}</h1>
  </div>

  {{#has_views}}
  <div class="grid gap-3">
    {{#views}}
    <button
        class="card card-border bg-base-100 shadow hover:shadow-md transition-shadow text-left w-full"
        hx-get="/u-board/admin/datamark-reports/result?source={{source_url_name}}&view={{url_name}}"
        hx-target="#main-content"
        hx-swap="innerHTML"
        hx-push-url="?t=datamark-reports&source={{source_url_name}}&view={{url_name}}">
      <div class="card-body py-4">
        <span class="font-semibold text-lg">{{name}}</span>
      </div>
    </button>
    {{/views}}
  </div>
  {{/has_views}}

  {{^has_views}}
  <div class="flex flex-col items-center gap-4 py-16 text-center opacity-50">
    <span>No hay vistas configuradas para esta fuente.</span>
  </div>
  {{/has_views}}
</div>
