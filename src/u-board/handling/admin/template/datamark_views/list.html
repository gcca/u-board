<div class="mx-auto max-w-7xl">
  <div class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h1 class="text-4xl font-bold">Vistas Datamark</h1>
    </div>
    <button class="btn btn-primary" hx-get="/u-board/admin/datamark-views/form" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="?t=datamark-views-new">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>
      Nueva vista
    </button>
  </div>

  {{#has_message}}
  <div class="alert {{message_class}} mb-6">
    <span>{{message}}</span>
  </div>
  {{/has_message}}

  <div class="overflow-x-auto rounded-lg bg-base-100 shadow">
    <table class="table">
      <thead>
        <tr>
          <th>nombre</th>
          <th>fuente</th>
          <th>creado</th>
          <th class="text-right">acciones</th>
        </tr>
      </thead>
      <tbody>
        {{#views}}
        <tr class="hover align-top">
          <td>
            <div class="font-semibold">{{name}}</div>
          </td>
          <td>
            {{#source_name}}<span class="badge badge-outline">{{source_name}}</span>{{/source_name}}{{^source_name}}<span class="text-base-content/30">—</span>{{/source_name}}
          </td>
          <td>{{created_at}}</td>
          <td class="text-right">
            <div class="flex justify-end gap-2">
              <button class="btn btn-ghost btn-sm" hx-get="/u-board/admin/datamark-views/form?name={{url_name}}" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="?t=datamark-views-edit&name={{url_name}}" aria-label="Editar {{name}}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-4 w-4">
                  <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
                </svg>
              </button>
              <form hx-post="/u-board/admin/datamark-views/remove" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="?t=datamark-views" hx-confirm="¿Eliminar esta vista Datamark?">
                <input type="hidden" name="name" value="{{name}}" />
                <button type="submit" class="btn btn-ghost btn-sm text-error" aria-label="Eliminar {{name}}">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-4 w-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                  </svg>
                </button>
              </form>
            </div>
          </td>
        </tr>
        {{/views}}
        {{^has_views}}
        <tr>
          <td colspan="4">
            <div class="flex flex-col items-center gap-4 py-12 text-center">
              <div class="text-lg font-semibold">No hay vistas Datamark</div>
              <button class="btn btn-primary" hx-get="/u-board/admin/datamark-views/form" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="?t=datamark-views-new">
                Nueva vista
              </button>
            </div>
          </td>
        </tr>
        {{/has_views}}
      </tbody>
    </table>
  </div>
</div>
